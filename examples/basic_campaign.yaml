title: "Power Supply Validation - Rev B"
version: "1.0"
description: >
  End-of-line validation for the dual-output power supply board.
  Measures output voltages, ripple, and efficiency under load.

variables:
  load_resistor: 10.0
  tolerance_3v3: 0.05
  tolerance_5v0: 0.10

instruments:
  dmm:
    kind: keysight_34460a
    resource: "TCPIP0::192.168.1.100::inst0::INSTR"
    timeout: 5000
    options:
      nplc: 10

  scope:
    kind: rigol_ds1000z
    resource: "USB0::0x1AB1::0x04B0::DS1ZA123456::INSTR"
    timeout: 10000

  psu:
    kind: rs_nga100
    resource: "TCPIP0::192.168.1.101::inst0::INSTR"
    timeout: 3000

groups:
  setup:
    description: "Configure equipment"
    steps:
      - name: "Enable DMM"
        instrument: dmm
        command: "*RST"
      - name: "Configure scope"
        instrument: scope
        command: ":SYSTem:LANGuage EN"
      - name: "Configure PSU output"
        instrument: psu
        measurements:
          - name: "PSU_ready"
            type: "volt"
            limits:
              - op: eq
                value: 0.0
                tolerance: 0.1

  voltage_outputs:
    description: "Measure main output voltages under no-load and full-load"
    steps:
      - name: "3.3V rail - no load"
        instrument: dmm
        measurements:
          - name: "Vout_3v3_nl"
            type: "volt:dc"
            limits:
              - op: within
                value: 3.3
                tolerance: 0.05
        options:
          range: 10

      - name: "5.0V rail - no load"
        instrument: dmm
        measurements:
          - name: "Vout_5v0_nl"
            type: "volt:dc"
            limits:
              - op: within
                value: 5.0
                tolerance: 0.10
        options:
          range: 10

      - name: "3.3V rail ripple"
        instrument: scope
        measurements:
          - name: "Vripple_3v3"
            type: "volt:ac"
            limits:
              - op: lt
                value: 0.050
        post_processing:
          window: hann
          filter_type: lowpass
          filter_cutoff: 0.3
          filter_order: 4

  efficiency:
    description: "Measure efficiency at full load"
    depends_on:
      - voltage_outputs
    steps:
      - name: "Input current"
        instrument: psu
        measurements:
          - name: "I_in"
            type: "curr"
      - name: "Input voltage"
        instrument: dmm
        measurements:
          - name: "V_in"
            type: "volt:dc"
            limits:
              - op: within
                value: 12.0
                tolerance: 0.5

output:
  directory: "reports"
  formats:
    - html
    - pdf

ci_hooks:
  junit: true
  junit_output: "test-results.xml"
  slack_webhook: ""
