apiVersion: batch/v1
kind: CronJob
metadata:
  name: valicore-smoke
spec:
  schedule: "0 6 * * 1-5"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: valicore
              image: valicore:latest
              imagePullPolicy: IfNotPresent
              command: ["valicore", "validate", "/campaigns/smoke-test.yaml"]
              volumeMounts:
                - name: campaigns
                  mountPath: /campaigns
          restartPolicy: OnFailure
          volumes:
            - name: campaigns
              configMap:
                name: valicore-campaigns
