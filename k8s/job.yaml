apiVersion: batch/v1
kind: Job
metadata:
  name: valicore-capture
spec:
  template:
    spec:
      containers:
        - name: valicore
          image: valicore:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "/scripts/capture.py"]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      restartPolicy: Never
      volumes:
        - name: scripts
          configMap:
            name: valicore-scripts
