apiVersion: v1
kind: ConfigMap
metadata:
  name: valicore-scripts
data:
  capture.py: |
    from valicore.instruments import create_instrument
    from valicore.core import RustSignalProcessor

    instr = create_instrument("rigol_ds1000z", "TCPIP0::192.168.1.100::inst0::INSTR")
    instr.connect()
    data = instr.get_waveform("CH1")
    stats = RustSignalProcessor.stats(data)
    print(f"mean={stats['mean']:.4f} rms={stats['rms']:.4f}")
