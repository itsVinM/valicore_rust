      set_ch_off: "SELECT:CH{ch} OFF"
      set_v_scale: "CH{ch}:SCAle {val}"
      set_v_offset: "CH{ch}:OFFSet {val}"
      set_coupling: "CH{ch}:COUPling {val}"
      set_h_scale: "HORizontal:SCAle {val}"
      set_h_pos: "HORizontal:POSition {val}"
      set_trig_source: "TRIGger:MAIn:SOUrce CH{ch}"
      set_trig_level: "TRIGger:MAIn:LEVel {val}"
      set_trig_slope: "TRIGger:MAIn:SLOPe {val}"
      get_v_scale: "CH{ch}:SCAle?"
      get_v_offset: "CH{ch}:OFFSet?"
      get_coupling: "CH{ch}:COUPling?"
      get_h_scale: "HORizontal:SCAle?"
      get_h_pos: "HORizontal:POSition?"
      get_trig_source: "TRIGger:MAIn:SOUrce?"
      get_trig_level: "TRIGger:MAIn:LEVel?"
      get_trig_slope: "TRIGger:MAIn:SLOPe?"
      get_raw: "CURVe?"
      set_source: "DATa:SOUrce CH{ch}"

