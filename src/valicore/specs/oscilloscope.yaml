# Oscilloscope SCPI Command Library
# Loaded by ScopeAutomation driver.
# Brands define SCPI command patterns + default IP; instances override IP + brand.

OSCILLOSCOPES:
  RS:
    description: "Rohde & Schwarz RTO/RTM/RTC series"
    ip_address: "192.168.1.10"
    endian: little
    quirks: "FORMat:BORDer LENDian; :FORMat REAL,32"
    cmds:
      reset: "*RST"
      autoset: "AUToset"
      run: "RUN"
      stop: "STOP"
      single: "SINGle"
      check_ch: "CHANnel{ch}:STATe?"
      set_ch_on: "CHANnel{ch}:STATe ON"
      set_ch_off: "CHANnel{ch}:STATe OFF"
      set_v_scale: "CHANnel{ch}:SCALe {val}"
      set_v_offset: "CHANnel{ch}:OFFSet {val}"
      set_coupling: "CHANnel{ch}:COUPling {val}"
      set_h_scale: "TIMebase:SCALe {val}"
      set_h_pos: "TIMebase:OFFSet {val}"
      set_trig_source: "TRIGger:SOURce CHANnel{ch}"
      set_trig_level: "TRIGger:LEVel {val}"
      set_trig_slope: "TRIGger:SLOPe {val}"
      get_v_scale: "CHANnel{ch}:SCALe?"
      get_v_offset: "CHANnel{ch}:OFFSet?"
      get_coupling: "CHANnel{ch}:COUPling?"
      get_h_scale: "TIMebase:SCALe?"
      get_h_pos: "TIMebase:OFFSet?"
      get_trig_source: "TRIGger:SOURce?"
      get_trig_level: "TRIGger:LEVel?"
      get_trig_slope: "TRIGger:SLOPe?"
      get_raw: "CHANnel{ch}:DATA:VALues?"

  TEKTRONIX:
    description: "Tektronix TDS/MSO/DPO series"
    ip_address: "192.168.1.20"
